<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Abstract secure tunnel cover illustration</title>
  <desc id="desc">A private server, operator cards, and a curved secure path rendered in teal, navy, amber, and coral.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12304a"/>
      <stop offset="55%" stop-color="#0f7e7b"/>
      <stop offset="100%" stop-color="#f2b443"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd27d"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#80efe7"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
